name: LocalAudioPlayer
options:
  bundleIdPrefix: net.karmait
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  LocalAudioPlayer:
    type: application
    platform: iOS
    sources:
      - path: LocalAudioPlayer
    settings:
      base:
        INFOPLIST_FILE: LocalAudioPlayer/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: net.karmait.local-audio-player
        PRODUCT_NAME: LocalAudioPlayer
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: LocalAudioPlayer/Info.plist
      properties:
        CFBundleName: Local Audio Player
        CFBundleDisplayName: Audio Player
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        LSSupportsOpeningDocumentsInPlace: true
        UISupportsDocumentBrowser: false
        CFBundleDocumentTypes:
          - CFBundleTypeName: Audio
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.audio
              - public.mp3
              - public.mpeg-4-audio
              - com.apple.m4a-audio
              - com.microsoft.waveform-audio
              - public.aiff-audio
              - org.xiph.flac
        UTImportedTypeDeclarations: []
